<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" fill="none">
  <defs>
    <!-- Glow vert extérieur -->
    <filter id="outerGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.09
                0 0 0 0 0.64
                0 0 0 0 0.29
                0 0 0 0.8 0" result="greenGlow"/>
      <feMerge>
        <feMergeNode in="greenGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Glow inner pour la bordure -->
    <filter id="borderGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Gradient fill bouclier -->
    <linearGradient id="shieldFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a4d2e"/>
      <stop offset="100%" stop-color="#0a2015"/>
    </linearGradient>
  </defs>

  <!-- Halo extérieur (glow ambiant) -->
  <path d="M60 6 L14 23 L14 65 C14 94 34 116 60 128 C86 116 106 94 106 65 L106 23 Z"
        fill="#16a34a" opacity="0.12"
        filter="url(#outerGlow)"/>

  <!-- Corps du bouclier -->
  <path d="M60 10 L18 26 L18 65 C18 92 37 113 60 124 C83 113 102 92 102 65 L102 26 Z"
        fill="url(#shieldFill)"/>

  <!-- Bordure bouclier avec glow -->
  <path d="M60 10 L18 26 L18 65 C18 92 37 113 60 124 C83 113 102 92 102 65 L102 26 Z"
        fill="none"
        stroke="#22c55e"
        stroke-width="2.5"
        filter="url(#borderGlow)"/>

  <!-- Lettre D -->
  <text x="60" y="86"
        font-family="'Arial Black', 'Arial', sans-serif"
        font-size="62"
        font-weight="900"
        text-anchor="middle"
        fill="white"
        letter-spacing="-2">D</text>
</svg>
