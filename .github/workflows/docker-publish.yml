# ===================================================================
# Dinthialma Frontend – CI/CD
# Build & Push Docker Hub → Deploy VPS
# ===================================================================
#
# Secrets GitHub requis (Settings → Secrets and variables → Actions) :
#   DOCKER_HUB_USERNAME    → ton username Docker Hub
#   DOCKER_HUB_TOKEN       → token Docker Hub (Read/Write)
#   VPS_HOST               → 155.117.40.193
#   VPS_USER               → administrator
#   VPS_SSH_PRIVATE_KEY    → contenu de ~/.ssh/deploy_key
#   VITE_API_URL           → https://api.dinthialma.com
# ===================================================================

name: CI/CD – Frontend

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'

jobs:

  # ═══════════════════════════════════════════════════════════════
  # STAGE 1 – Build & Push Docker Hub
  # ═══════════════════════════════════════════════════════════════
  build-push:
    name: Stage 1 – Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_HUB_USERNAME }}/dinthialma-frontend
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          # VITE_API_URL est compilé dans le bundle au moment du build
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ═══════════════════════════════════════════════════════════════
  # STAGE 2 – Deploy to VPS
  # ═══════════════════════════════════════════════════════════════
  deploy:
    name: Stage 2 – Deploy
    runs-on: ubuntu-latest
    needs: build-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          timeout: 120s
          script: |
            set -e
            cd /opt/dinthialma/backend

            echo "=== Login Docker Hub ==="
            echo "${{ secrets.DOCKER_HUB_TOKEN }}" | \
              docker login -u "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin

            echo "=== Pull nouvelle image frontend ==="
            docker compose -f docker/docker-compose.prod.yml --env-file docker/.env.prod pull frontend

            echo "=== Redémarrage frontend ==="
            docker compose -f docker/docker-compose.prod.yml --env-file docker/.env.prod \
              up -d --no-deps --remove-orphans frontend

            docker image prune -f
            echo "=== Déploiement frontend terminé ==="

  # ═══════════════════════════════════════════════════════════════
  # STAGE 3 – Health Check post-déploiement
  # ═══════════════════════════════════════════════════════════════
  health-check:
    name: Stage 3 – Health Check
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Vérifier https://www.dinthialma.com/health
        run: |
          echo "Attente frontend (max 2 min)..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://www.dinthialma.com/health || echo "000")
            echo "Attempt $i/12 – HTTP $STATUS"
            [ "$STATUS" = "200" ] && echo "Frontend healthy" && exit 0
            sleep 10
          done
          echo "Health check échoué"
          exit 1
